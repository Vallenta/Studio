name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please describe the problem you're trying to solve, not just the solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? Is your request related to a frustration or missing capability?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other approaches you've thought about and why they fall short.
    validations:
      required: false

  - type: dropdown
    id: tier
    attributes:
      label: Which tier should this feature belong to?
      options:
        - Free (essential for everyone)
        - Pro (advanced or power-user feature)
        - Either is fine
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Mockups, links, related issues.
    validations:
      required: false
